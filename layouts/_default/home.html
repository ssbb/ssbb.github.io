{{ define "main" }}
  <content>
    {{ .Content }}
  
    <h2>Most recent posts</h2>
    <ul class="blog-posts">
    {{ range ( where .Site.RegularPages "Type" "blog" | first 3 ) }}
      <li>
        <span>
          <i>
            <time datetime='{{ .Date.Format "2006-01-02" }}'>
              {{ .Date.Format (default "02 Jan, 2006" .Site.Params.dateFormat) }}
            </time>
          </i>
        </span>
        <a href="{{ .Permalink }}">{{ .Title }}</a>
      </li>
      {{ else }}
      <li>
        No posts yet
      </li>
      {{ end }}
    </ul>
  </content>
{{ end }}
